# Production-oriented stack: no bind-mounted source, Gunicorn, built frontend & realtime.
# Copy `.env.example` to `.env`, set secrets and public URLs, then:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Put TLS and domain routing in front (reverse proxy / load balancer). See DEPLOYMENT.md.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waflow}
      POSTGRES_USER: ${POSTGRES_USER:-waflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - waflow_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - waflow_redis_data:/data

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    environment:
      PORT: "8000"
      USE_GUNICORN: "true"
      RUN_MIGRATIONS: "true"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_EXPIRES_SECONDS: ${JWT_EXPIRES_SECONDS:-86400}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://waflow:waflow@db:5432/waflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-true}
      SEED_ADMIN: ${SEED_ADMIN:-false}
      SEED_ADMIN_ORG_NAME: ${SEED_ADMIN_ORG_NAME:-Demo Org}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@demo.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_GRAPH_API_VERSION: ${WHATSAPP_GRAPH_API_VERSION:-v21.0}
      WHATSAPP_CONVERSATION_WINDOW_HOURS: ${WHATSAPP_CONVERSATION_WINDOW_HOURS:-24}
      MEDIA_UPLOAD_DIR: ${MEDIA_UPLOAD_DIR:-/app/data/media}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      - db
      - redis
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - waflow_media:/app/data/media

  celery_worker:
    build:
      context: ./apps/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://waflow:waflow@db:5432/waflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_GRAPH_API_VERSION: ${WHATSAPP_GRAPH_API_VERSION:-v21.0}
      MEDIA_UPLOAD_DIR: ${MEDIA_UPLOAD_DIR:-/app/data/media}
    depends_on:
      - db
      - redis
    volumes:
      - waflow_media:/app/data/media
    command: celery -A app.celery_app worker --loglevel=info

  celery_beat:
    build:
      context: ./apps/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://waflow:waflow@db:5432/waflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
    depends_on:
      - db
      - redis
    command: celery -A app.celery_app beat --loglevel=info

  realtime:
    build:
      context: ./services/realtime
    restart: unless-stopped
    environment:
      PORT: "4001"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}
    depends_on:
      - redis
    ports:
      - "${REALTIME_PORT:-4001}:4001"

  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      PORT: "3000"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  waflow_postgres_data:
  waflow_redis_data:
  waflow_media:
