services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waflow}
      POSTGRES_USER: ${POSTGRES_USER:-waflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-waflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - waflow_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - waflow_redis_data:/data

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    environment:
      # Server
      PORT: ${BACKEND_PORT:-8000}
      # Auth
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_SECONDS: ${JWT_EXPIRES_SECONDS:-86400}
      # DB / Cache
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://waflow:waflow@db:5432/waflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      # Optional seed
      SEED_ADMIN: ${SEED_ADMIN:-false}
      SEED_ADMIN_ORG_NAME: ${SEED_ADMIN_ORG_NAME:-Demo Org}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@demo.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin12345}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-dev-verify-token}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_GRAPH_API_VERSION: ${WHATSAPP_GRAPH_API_VERSION:-v21.0}
      WHATSAPP_CONVERSATION_WINDOW_HOURS: ${WHATSAPP_CONVERSATION_WINDOW_HOURS:-24}
      MEDIA_UPLOAD_DIR: ${MEDIA_UPLOAD_DIR:-/app/data/media}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      - db
      - redis
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./apps/backend:/app
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8000} --reload"

  celery_worker:
    build:
      context: ./apps/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://waflow:waflow@db:5432/waflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_GRAPH_API_VERSION: ${WHATSAPP_GRAPH_API_VERSION:-v21.0}
      MEDIA_UPLOAD_DIR: ${MEDIA_UPLOAD_DIR:-/app/data/media}
    depends_on:
      - db
      - redis
    volumes:
      - ./apps/backend:/app
    command: celery -A app.celery_app worker --loglevel=info

  celery_beat:
    build:
      context: ./apps/backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://waflow:waflow@db:5432/waflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
    depends_on:
      - redis
    volumes:
      - ./apps/backend:/app
    command: celery -A app.celery_app beat --loglevel=info

  realtime:
    build:
      context: ./services/realtime
    restart: unless-stopped
    environment:
      PORT: ${REALTIME_PORT:-4001}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis
    ports:
      - "${REALTIME_PORT:-4001}:4001"
    volumes:
      - ./services/realtime:/app
    command: >
      sh -c "npm install && npm run dev"

  # Next.js dev server in Docker. The *browser* calls the API, so use a host URL
  # (e.g. http://localhost:8000), not http://backend:8000. Match BACKEND_PORT in .env.
  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./apps/frontend:/app
      - waflow_frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: >
      sh -c "npm install && npx next dev -p 3000 -H 0.0.0.0"

volumes:
  waflow_postgres_data:
  waflow_redis_data:
  waflow_frontend_node_modules:

